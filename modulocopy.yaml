---
- name: exemplo do modulo copy
  hosts: web
  tasks:
    - name: copiar diversas linhas
      copy:
        content: |
          linha 1
          linha 2
          linha 3
        dest: /tmp/diversas-linhas.txt 
    - name: copiar em apenas uma linha
      copy:
        content: >
          linha 1
          linha 2
          linha 3
        dest: /tmp/uma-linha.txt 
           
