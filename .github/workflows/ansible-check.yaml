name: Ansible Lab Validation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint yamllint

      - name: YAML lint
        run: yamllint .

      - name: Validate inventory
        run: ansible-inventory -i inventories/dev/hosts --graph

      - name: Syntax check
        run: |
          ansible-playbook --syntax-check -i inventories/dev/hosts playbooks/site.yml

      - name: Ansible lint
        run: ansible-lint .
